# Keeps the free-tier Render instance awake so signups never hit a cold start.
# Remove this once the service is on the paid always-on plan.
name: keep-warm
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 90 https://freshaf.onrender.com/api/pricing > /dev/null || true
