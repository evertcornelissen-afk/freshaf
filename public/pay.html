<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshAF — Secure payment</title>
<link rel="icon" href="/img/logo-mark.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>document.documentElement.dataset.theme = localStorage.getItem('freshaf_theme') || 'light';</script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="splash">
  <img class="logo-light-v" src="/img/logo.svg" alt="FreshAF"><img class="logo-dark-v" src="/img/logo-dark.svg" alt="FreshAF">
  <div class="dots"><span></span><span></span><span></span></div>
</div>
<div class="topbar">
  <div class="brand">
    <span class="stack">
      <img class="logo-img logo-light-v" src="/img/logo.svg" alt="FreshAF"><img class="logo-img logo-dark-v" src="/img/logo-dark.svg" alt="FreshAF">
      <span class="tag">Secure checkout</span>
    </span>
  </div>
</div>
<div class="wrap">
  <div class="card view-anim" style="max-width:460px;margin:56px auto">
    <span class="pill warn">Sandbox mode</span>
    <h2 class="mt" id="h-pay">Pay for your wash</h2>
    <p class="muted small-text" style="line-height:1.6;margin-top:8px">
      Live card payments are not enabled yet (no PayFast merchant keys configured).
      This sandbox page simulates the payment redirect so the full order flow works.
    </p>
    <div class="msg error" id="pay-error"></div>
    <div class="total-bar" id="pay-summary" style="margin-top:20px"></div>
    <div class="row mt">
      <button id="btn-pay">Pay now — simulate success</button>
      <button class="ghost" id="btn-cancel">Cancel</button>
    </div>
  </div>
</div>
<script src="/js/common.js"></script>
<script>
el('h-pay').insertAdjacentHTML('afterbegin', icon('lock'));
const orderId = Number(window.location.pathname.split('/').pop());
async function load() {
  try {
    const { order } = await api(`/api/orders/${orderId}`);
    if (order.status !== 'pending_payment') { window.location.href = `/?track=${orderId}`; return; }
    const rewards = order.points_used_cents > 0 ? `<br><span class="small-text">Rewards applied −${rand(order.points_used_cents)}</span>` : '';
    el('pay-summary').innerHTML = `<span class="muted">Order #${order.id}<br><span class="small-text">${order.address}</span>${rewards}</span>
      <span class="amount"><strong>${rand(order.amount_due_cents)}</strong></span>`;
    hideSplash();
  } catch (e) { showError('pay-error', e.message); hideSplash(); }
}
el('btn-pay').onclick = async () => {
  try {
    await api(`/api/orders/${orderId}/pay-sandbox`, { method: 'POST' });
    window.location.href = `/?track=${orderId}`;
  } catch (e) { showError('pay-error', e.message); }
};
el('btn-cancel').onclick = async () => {
  try { await api(`/api/orders/${orderId}/cancel`, { method: 'POST' }); } catch {}
  window.location.href = '/';
};
load();
</script>
</body>
</html>
